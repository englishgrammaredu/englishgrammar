<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 20px;
            border: 1px solid #333;
            border-radius: 12px;
            background: #1e1e1e;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #ff4b2b;
        }
        p {
            font-size: 1.1rem;
            color: #b0b0b0;
            margin-bottom: 30px;
        }
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .btn {
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .verb-btn {
            background: #4e54c8;
            color: white;
        }
        .verb-btn:hover {
            background: #6366f1;
            transform: translateY(-2px);
        }
        .adj-btn {
            background: #00b09b;
            color: white;
        }
        .adj-btn:hover {
            background: #00d2ff;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>I'm not done 🥀</h1>
        <p>Sadly, the homepage isn't done.<br>Go to the verb/adjective generator for now.</p>
        
        <div class="button-group">
            <a href="verb.html" class="btn verb-btn">Verb Generator</a>
        </div>
    </div>

</body>
</html>
